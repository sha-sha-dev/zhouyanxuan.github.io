                anime({ targets: popup, scale: [0.8, 1], opacity: [0, 1], duration: 600, delay: 400, easing: 'easeOutBack' });

                const map = document.getElementById('map');
                const overlay = document.getElementById('modal-overlay');
                const popup = document.getElementById('context-popup');

            function updateTimeline(percent) {
                const handle = document.getElementById('timeline-handle');
                handle.style.left = `calc(${percent}% - 12px)`;

            let isDragging = false;
            const track = document.querySelector('.timeline-track');
            const handle = document.getElementById('timeline-handle');

                if (!isDragging) return;
                const rect = track.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
                updateTimeline(percent);

                else if (percent < 70) zoomToLocation('nanjing', 60, 58);

    (function () {
        let startTime = null, totalTime = 0, reportTimer = null;
        function startTimer() { if (!startTime) startTime = Date.now(); }
        function stopTimer() { if (startTime) { totalTime += Date.now() - startTime; startTime = null; } }
        function isPageVisible() { return !document.hidden && (!document.visibilityState || document.visibilityState === 'visible') && document.hasFocus(); }
        function reportStayTime(eventType, immediate = false) {
            stopTimer();
            if (reportTimer) clearTimeout(reportTimer);
            if (immediate) { doReport(eventType); return; }
            reportTimer = setTimeout(() => { doReport(eventType); reportTimer = null; }, 100);
        }
        function doReport() {
            if (window.frog && totalTime > 0) {
                const chatId = (window.__SERVER_DATA__ || {}).watermarkChatId;
                window.frog.add({ url: '/time/HtmlPage/enter', eventId: 42818, customExtend: { chat_id: chatId, use_time: Math.floor(totalTime / 1000) }, duration: Math.floor(totalTime / 1000), currentPage: 'HtmlPage', eventAction: 'time', eventName: 'enter' });
                totalTime = 0;
            }
        }
        function cleanup() { if (reportTimer) clearTimeout(reportTimer); document.removeEventListener('visibilitychange', handleVisibilityChange); window.removeEventListener('blur', handleBlur); window.removeEventListener('focus', handleFocus); window.removeEventListener('beforeunload', handleBeforeUnload); window.removeEventListener('pagehide', handlePageHide); startTime = null; totalTime = 0; }
        function handleVisibilityChange() { if (document.hidden) reportStayTime('visibilitychange'); else startTimer(); }
        function handleBlur() { reportStayTime('blur'); }
        function handleFocus() { startTimer(); }
        function handleBeforeUnload() { reportStayTime('beforeunload', true); cleanup(); }
        function handlePageHide() { reportStayTime('pagehide', true); }
        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('blur', handleBlur);
        window.addEventListener('focus', handleFocus);
        if (document.readyState === 'loading') window.addEventListener('DOMContentLoaded', () => { if (isPageVisible()) startTimer(); });
        else if (isPageVisible()) startTimer();
        window.addEventListener('beforeunload', handleBeforeUnload);
        window.addEventListener('pagehide', handlePageHide);
    })();

    function trackLogoClick(e) { e.stopPropagation(); if (window.frog) { const chatId = (window.__SERVER_DATA__ || {}).watermarkChatId; window.frog.add({ url: '/click/HtmlPage/logo', eventId: 42816, customExtend: { chat_id: chatId }, currentPage: 'HtmlPage', eventAction: 'click', eventName: 'logo' }); } }
    function trackStartButtonClick(e) { e.stopPropagation(); if (window.frog) { const chatId = (window.__SERVER_DATA__ || {}).watermarkChatId; window.frog.add({ url: '/click/HtmlPage/start', eventId: 42817, customExtend: { chat_id: chatId }, currentPage: 'HtmlPage', eventAction: 'click', eventName: 'start' }); } }

    document.addEventListener('DOMContentLoaded', function () {
        const logo = document.querySelector('.left-watermark-content');
        if (logo) logo.addEventListener('click', (e) => { trackLogoClick(e); openFeixiangTeacher(e); });
        const btn = document.querySelector('.jump-button');
        if (btn) btn.addEventListener('click', (e) => { trackStartButtonClick(e); openFeixiangTeacher(e); });
        const overlay = document.querySelector('.watermark-overlay');
        if (overlay) overlay.addEventListener('click', (e) => { if (!e.target.closest('.left-watermark-content') && !e.target.closest('.jump-button')) openFeixiangTeacher(e); });
    });

    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile();
        const btn = document.querySelector('.jump-button');
        if (btn) btn.style.display = isMobile ? 'none' : 'flex';
        const container = document.querySelector('.iframe-container');
        if (container) isMobile ? container.classList.add('mobile') : container.classList.remove('mobile');
    }
    function handleResize() { checkAndHideButtonOnMobile(); const isMobile = getIsMobile(); const overlay = document.querySelector('.watermark-overlay'); if (overlay) overlay.onclick = isMobile ? null : openFeixiangTeacher; const container = document.querySelector('.iframe-container'); if (container) isMobile ? container.classList.add('mobile') : container.classList.remove('mobile'); }
    window.addEventListener('resize', handleResize);
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    window.addEventListener('beforeunload', () => window.removeEventListener('resize', handleResize));
</script>
</body>
</html>
